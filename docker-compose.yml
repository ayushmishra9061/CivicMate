services:
  server:
    build:
      context: ./server
    env_file:
      - ./.env
    ports:
      - "5000:5000"
    depends_on:
      - ai-service
    restart: unless-stopped

  client:
    build:
      context: ./client
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_SOCKET_URL: http://localhost:5000
    ports:
      - "5173:5173"
    depends_on:
      - server
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
    environment:
      YOLO_MODEL_PATH: /app/models/civicmate-yolov8.pt
    ports:
      - "8000:8000"
    restart: unless-stopped
